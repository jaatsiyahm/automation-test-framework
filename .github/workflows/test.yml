name: Automation Test Framework CI
on:
  workflow_dispatch:
    inputs:
      test_type:
        description: 'Choose test type'
        required: true
        default:
        type: choice
        options:
          - all
          - api
          - web
  pull_request:
    branches:
      - main
      - develop

jobs:

  api-tests:
    name: Run API Tests
    runs-on: ubuntu-latest

    if: >
      github.event_name == 'pull_request' ||
      github.event.inputs.test_type == 'all' ||
      github.event.inputs.test_type == 'api'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission to gradlew
        run: chmod +x gradlew

      - name: Run API Tests
        run: ./gradlew apiTest --no-daemon

      - name: Upload API Test Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-test-reports
          path: build/reports/cucumber/api/
          retention-days: 30

  web-tests:
    name: Run Web UI Tests
    runs-on: ubuntu-latest

    if: >
      github.event_name == 'pull_request' ||
      github.event.inputs.test_type == 'all' ||
      github.event.inputs.test_type == 'web'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission to gradlew
        run: chmod +x gradlew

      - name: Install Google Chrome
        run: |
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Run Web Tests (Headless)
        run: ./gradlew webTest --no-daemon -Dheadless=true

      - name: Upload Web Test Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: web-test-reports
          path: build/reports/cucumber/web/
          retention-days: 30